<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60" fill="none">
  <g transform="translate(0, 5)">
    <!-- Circle Logo Background -->
    <circle cx="25" cy="25" r="25" fill="#0b4c8c" />
    
    <!-- Top Green Half -->
    <path d="M 0 25 A 25 25 0 0 1 50 25 Z" fill="#2d9d43" />
    
    <!-- Chevron / Diagonal stripes in top green half -->
    <clipPath id="top-clip">
      <path d="M 0 25 A 25 25 0 0 1 50 25 Z" />
    </clipPath>
    <g clip-path="url(#top-clip)">
      <!-- Left-leaning lines -->
      <line x1="5" y1="0" x2="25" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="15" y1="0" x2="35" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="25" y1="0" x2="45" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="-5" y1="0" x2="15" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="-15" y1="0" x2="5" y2="25" stroke="white" stroke-width="2" opacity="0.8" />

      <!-- Right-leaning lines (to make chevrons) -->
      <line x1="45" y1="0" x2="25" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="35" y1="0" x2="15" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="25" y1="0" x2="5" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="55" y1="0" x2="35" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
      <line x1="65" y1="0" x2="45" y2="25" stroke="white" stroke-width="2" opacity="0.8" />
    </g>
    
    <!-- Bottom Blue Half vertical stripes -->
    <clipPath id="bottom-clip">
      <path d="M 0 25 A 25 25 0 0 0 50 25 Z" />
    </clipPath>
    <g clip-path="url(#bottom-clip)">
      <line x1="5" y1="25" x2="5" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="10" y1="25" x2="10" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="15" y1="25" x2="15" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="20" y1="25" x2="20" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="25" y1="25" x2="25" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="30" y1="25" x2="30" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="35" y1="25" x2="35" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="40" y1="25" x2="40" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
      <line x1="45" y1="25" x2="45" y2="50" stroke="white" stroke-width="1.8" opacity="0.8" />
    </g>
  </g>
  
  <!-- Text Elements (Hidden by CSS when using custom logo display, but useful as fallback) -->
  <text x="65" y="28" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="21" fill="#0b4c8c">SAM Investments</text>
  <text x="65" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="12" fill="#555555" letter-spacing="0.5">Investments &amp; Taxation</text>
</svg>
